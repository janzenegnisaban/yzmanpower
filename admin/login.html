<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Sign In — YZ Manpower</title>
<link rel="icon" href="../Untitled%20design.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
body { background: #0a1420; }
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; position: relative; overflow: hidden; }
.auth-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 30%, rgba(192,21,15,0.12) 0%, transparent 60%); pointer-events: none; }
.auth-bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.018) 1px,transparent 1px), linear-gradient(90deg,rgba(255,255,255,0.018) 1px,transparent 1px); background-size: 60px 60px; pointer-events: none; }
.auth-card { position: relative; z-index: 2; background: #0f1e2e; border: 1px solid rgba(255,255,255,0.07); border-top: 3px solid var(--red); padding: 2.75rem 2.5rem; width: 100%; max-width: 420px; }
/* logo */
.auth-logo { text-align: center; margin-bottom: 2rem; }
.auth-logo-mark { width: 52px; height: 52px; background: var(--red); clip-path: polygon(0 0,100% 0,100% 75%,75% 100%,0 100%); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue',sans-serif; font-size: 1.2rem; color: #fff; margin: 0 auto 0.7rem; }
.auth-brand { font-family: 'Barlow Condensed',sans-serif; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white); }
.auth-brand span { color: var(--red); }
/* portal badge */
.portal-badge { display: inline-flex; align-items: center; gap: 0.4rem; background: rgba(192,21,15,0.1); border: 1px solid rgba(192,21,15,0.25); padding: 0.3rem 0.85rem; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--red); margin: 0 auto 1.5rem; }
.portal-badge-wrap { text-align: center; }
.auth-heading { font-family: 'Bebas Neue',sans-serif; font-size: 2rem; letter-spacing: 0.04em; text-align: center; margin-bottom: 0.25rem; }
.auth-sub { font-size: 0.8rem; color: var(--gray); text-align: center; margin-bottom: 2rem; }
/* fields */
.form-field { margin-bottom: 1.2rem; }
.form-field label { display: block; font-size: 0.67rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray); font-weight: 600; margin-bottom: 0.45rem; }
.form-field input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09); color: var(--white); padding: 0.82rem 1rem; font-family: 'Barlow',sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.2s; }
.form-field input:focus { border-color: var(--red); }
.form-field input::placeholder { color: rgba(168,168,164,0.4); }
/* alerts */
.alert { padding: 0.75rem 1rem; font-size: 0.82rem; margin-bottom: 1.1rem; display: none; line-height: 1.5; }
.alert.show { display: block; }
.alert-error   { background: rgba(192,21,15,0.1); border: 1px solid rgba(192,21,15,0.3); color: #ff7b7b; }
.alert-success { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.22); color: #4ade80; }
.alert-warn    { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.25); color: #fbbf24; }
/* button */
.btn-submit { width: 100%; background: var(--red); color: #fff; padding: 0.9rem; font-family: 'Barlow',sans-serif; font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; border: none; cursor: pointer; transition: background 0.2s; margin-top: 0.2rem; }
.btn-submit:hover { background: var(--red-dark); }
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-rule { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 1.6rem 0 1.3rem; }
.auth-links { text-align: center; font-size: 0.78rem; color: var(--gray); line-height: 2; }
.auth-links a { color: var(--red); text-decoration: none; }
.auth-links a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-bg"></div>
  <div class="auth-bg-grid"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-mark">YZ</div>
      <div class="auth-brand"><span>YZ</span> Manpower Services</div>
    </div>

    <div class="portal-badge-wrap">
      <span class="portal-badge">&#9632; Staff Portal</span>
    </div>

    <h1 class="auth-heading">Staff Sign In</h1>
    <p class="auth-sub">For authorized HR and Admin personnel only</p>

    <div class="alert alert-error"   id="errBox"></div>
    <div class="alert alert-warn"    id="warnBox"></div>
    <div class="alert alert-success" id="okBox"></div>

    <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
      <div class="form-field">
        <label for="loginEmail">Email Address</label>
        <input type="email" id="loginEmail" placeholder="staff@yzmanpower.com" required autocomplete="email">
      </div>
      <div class="form-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">Sign In to Staff Portal</button>
    </form>

    <hr class="auth-rule">
    <div class="auth-links">
      <a href="#" onclick="forgotPassword(event)">Forgot password?</a><br>
      New staff member? <a href="signup.html">Create staff account</a><br>
      <a href="../index.html">← Back to main site</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script>
function showErr(msg)  { const e=document.getElementById('errBox');  e.textContent=msg; e.classList.add('show'); ['warnBox','okBox'].forEach(id=>document.getElementById(id).classList.remove('show')); }
function showWarn(msg) { const e=document.getElementById('warnBox'); e.textContent=msg; e.classList.add('show'); ['errBox','okBox'].forEach(id=>document.getElementById(id).classList.remove('show')); }
function showOk(msg)   { const e=document.getElementById('okBox');   e.textContent=msg; e.classList.add('show'); ['errBox','warnBox'].forEach(id=>document.getElementById(id).classList.remove('show')); }
function clearAll()    { ['errBox','warnBox','okBox'].forEach(id=>document.getElementById(id).classList.remove('show')); }

async function handleLogin(e) {
  e.preventDefault();
  clearAll();

  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn      = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    showErr(error.message);
    btn.disabled = false; btn.textContent = 'Sign In to Staff Portal';
    return;
  }

  // Role check — only admin and hr may enter
  const { data: profile } = await sb
    .from('yz_profiles')
    .select('role, full_name')
    .eq('id', data.user.id)
    .single();

  if (!profile || !['admin','hr'].includes(profile.role)) {
    await sb.auth.signOut();
    showWarn('Access denied. This portal is for authorised staff only. If you are an applicant, please use the main sign-in page.');
    btn.disabled = false; btn.textContent = 'Sign In to Staff Portal';
    return;
  }

  showOk('Welcome back, ' + (profile.full_name?.split(' ')[0] || 'Staff') + '. Redirecting…');
  setTimeout(() => { window.location.href = 'index.html'; }, 900);
}

async function forgotPassword(e) {
  e.preventDefault();
  clearAll();
  const email = document.getElementById('loginEmail').value.trim();
  if (!email) { showErr('Enter your email address above, then click Forgot password.'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/admin/reset-password.html'
  });
  if (error) { showErr(error.message); return; }
  showOk('Password reset email sent to ' + email + '. Check your inbox.');
}

// Already logged in as staff? skip straight to dashboard
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  const { data: p } = await sb.from('yz_profiles').select('role').eq('id', session.user.id).single();
  if (p?.role === 'admin' || p?.role === 'hr') window.location.href = 'index.html';
})();
</script>
</body>
</html>
