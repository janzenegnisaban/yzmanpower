<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applications — YZ Manpower Admin</title>
<link rel="icon" href="../Untitled%20design.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
body { display: flex; min-height: 100vh; }
.admin-sidebar { width: 230px; min-width: 230px; background: var(--navy-mid); border-right: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; padding: 1.5rem 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
.sidebar-logo { display: flex; align-items: center; gap: 0.75rem; padding: 0 1.5rem 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 1.5rem; }
.sidebar-logo-mark { width: 38px; height: 38px; background: var(--red); clip-path: polygon(0 0,100% 0,100% 75%,75% 100%,0 100%); display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue',sans-serif; font-size: 1rem; color: #fff; flex-shrink: 0; }
.sidebar-brand { font-family: 'Barlow Condensed',sans-serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; line-height: 1.3; }
.sidebar-brand span { color: var(--red); }
.sidebar-brand small { display: block; font-size: 0.62rem; color: var(--gray); letter-spacing: 0.08em; font-weight: 400; text-transform: uppercase; margin-top: 0.1rem; }
.sidebar-nav { flex: 1; }
.sidebar-nav a { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1.5rem; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); text-decoration: none; transition: all 0.2s; border-left: 3px solid transparent; }
.sidebar-nav a:hover, .sidebar-nav a.active { color: var(--white); background: rgba(255,255,255,0.04); border-left-color: var(--red); }
.sidebar-nav a .nav-icon { font-size: 1rem; }
.sidebar-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 0.75rem 0; }
.sidebar-bottom { padding: 1.5rem; border-top: 1px solid rgba(255,255,255,0.06); }
.sidebar-user { font-size: 0.75rem; color: var(--gray); margin-bottom: 0.75rem; }
.sidebar-user strong { display: block; color: var(--light); font-weight: 600; font-size: 0.8rem; }
.sidebar-signout { width: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--gray); padding: 0.5rem; font-family: 'Barlow',sans-serif; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.sidebar-signout:hover { border-color: var(--red); color: var(--white); }
.admin-main { margin-left: 230px; flex: 1; padding: 2.5rem; min-height: 100vh; background: var(--navy); }
.admin-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.admin-topbar h1 { font-family: 'Bebas Neue',sans-serif; font-size: 2rem; letter-spacing: 0.02em; }
.admin-topbar .sub { font-size: 0.82rem; color: var(--gray); margin-top: 0.2rem; }
/* Filters */
.filters-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
.filter-input { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.6rem 1rem; font-family: 'Barlow',sans-serif; font-size: 0.85rem; outline: none; min-width: 220px; }
.filter-input:focus { border-color: var(--red); }
.filter-input::placeholder { color: rgba(168,168,164,0.5); }
.filter-select { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.6rem 1rem; font-family: 'Barlow',sans-serif; font-size: 0.85rem; outline: none; cursor: pointer; }
.filter-select:focus { border-color: var(--red); }
.filter-select option { background: var(--navy-mid); }
/* Table card */
.section-card { background: var(--navy-mid); border: 1px solid rgba(255,255,255,0.07); padding: 1.75rem; }
.section-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
.section-card-title { font-family: 'Barlow Condensed',sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--red); }
.record-count { font-size: 0.78rem; color: var(--gray); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
th { text-align: left; font-size: 0.65rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gray); padding: 0 0.75rem 0.75rem; font-weight: 600; white-space: nowrap; }
td { padding: 0.85rem 0.75rem; border-top: 1px solid rgba(255,255,255,0.05); color: var(--light); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,0.02); }
.status-pill { display: inline-block; padding: 0.2rem 0.65rem; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
.pill-pending  { background: rgba(251,191,36,0.12); color: #fbbf24; }
.pill-reviewing { background: rgba(99,179,237,0.12); color: #63b3ed; }
.pill-approved { background: rgba(74,222,128,0.1); color: #4ade80; }
.pill-hired    { background: rgba(192,21,15,0.12); color: #ff7b7b; }
.pill-rejected { background: rgba(100,100,100,0.1); color: var(--gray); }
.btn-view { font-size: 0.72rem; color: var(--red); text-decoration: none; letter-spacing: 0.08em; border: 1px solid rgba(192,21,15,0.3); padding: 0.28rem 0.7rem; transition: all 0.2s; white-space: nowrap; }
.btn-view:hover { background: rgba(192,21,15,0.1); }
.empty-row { text-align: center; color: var(--gray); padding: 2.5rem; font-size: 0.85rem; }
@media (max-width: 768px) { .admin-sidebar { display: none; } .admin-main { margin-left: 0; } }
</style>
</head>
<body>

<aside class="admin-sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-mark">YZ</div>
    <div class="sidebar-brand"><span>YZ</span> Manpower<small>Admin Panel</small></div>
  </div>
  <nav class="sidebar-nav">
    <a href="index.html"><span class="nav-icon">&#9632;</span> Dashboard</a>
    <a href="applications.html" class="active"><span class="nav-icon">&#128196;</span> Applications</a>
    <a href="pipeline.html"><span class="nav-icon">&#128202;</span> Pipeline</a>
    <div class="sidebar-divider"></div>
    <a href="accounts.html"><span class="nav-icon">&#128100;</span> HR Accounts</a>
    <div class="sidebar-divider"></div>
    <a href="../index.html"><span class="nav-icon">&#8592;</span> Back to Site</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="sidebar-user">Signed in as<strong id="sidebarUser">—</strong></div>
    <button class="sidebar-signout" onclick="signOut()">Sign Out</button>
  </div>
</aside>

<main class="admin-main">
  <div class="admin-topbar">
    <div>
      <h1>Applications</h1>
      <div class="sub">Review and manage all applicant submissions</div>
    </div>
    <button onclick="exportCSV()" style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:var(--gray);padding:0.55rem 1.1rem;font-family:'Barlow',sans-serif;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--red)';this.style.color='var(--white)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.15)';this.style.color='var(--gray)'">&#8595; Export CSV</button>
  </div>

  <div class="filters-bar">
    <input type="text" class="filter-input" id="searchInput" placeholder="Search by name or email…" oninput="applyFilters()">
    <select class="filter-select" id="statusFilter" onchange="applyFilters()">
      <option value="">All Statuses</option>
      <option value="pending">Pending</option>
      <option value="reviewing">Reviewing</option>
      <option value="approved">Approved</option>
      <option value="hired">Hired</option>
      <option value="rejected">Rejected</option>
    </select>
    <select class="filter-select" id="posFilter" onchange="applyFilters()">
      <option value="">All Positions</option>
    </select>
  </div>

  <div class="section-card">
    <div class="section-card-header">
      <div class="section-card-title">All Applications</div>
      <div class="record-count" id="recordCount">—</div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Applicant</th>
            <th>Position</th>
            <th>Date Applied</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="appsTable">
          <tr><td colspan="5" class="empty-row">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase-config.js"></script>
<script>
async function signOut() { await sb.auth.signOut(); window.location.href = 'login.html'; }

let allApps = [];

function pillClass(s) {
  return { pending:'pill-pending', reviewing:'pill-reviewing', approved:'pill-approved', hired:'pill-hired', rejected:'pill-rejected' }[s] || '';
}
function pillLabel(s) {
  return { pending:'Pending', reviewing:'Reviewing', approved:'Approved', hired:'Hired', rejected:'Rejected' }[s] || s;
}

function applyFilters() {
  const q   = document.getElementById('searchInput').value.toLowerCase();
  const st  = document.getElementById('statusFilter').value;
  const pos = document.getElementById('posFilter').value;

  const filtered = allApps.filter(a => {
    const matchQ   = !q || (a.full_name || '').toLowerCase().includes(q) || (a.email || '').toLowerCase().includes(q);
    const matchSt  = !st || a.status === st;
    const matchPos = !pos || a.position_applied === pos;
    return matchQ && matchSt && matchPos;
  });

  renderTable(filtered);
}

function renderTable(apps) {
  const tbody = document.getElementById('appsTable');
  document.getElementById('recordCount').textContent = apps.length + ' record' + (apps.length !== 1 ? 's' : '');
  if (!apps.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-row">No applications found.</td></tr>';
    return;
  }
  tbody.innerHTML = apps.map(a => `
    <tr>
      <td><strong>${a.full_name || '—'}</strong><br><small style="color:var(--gray);font-size:0.75rem">${a.email}</small></td>
      <td>${a.position_applied}</td>
      <td>${new Date(a.created_at).toLocaleDateString('en-PH', { month:'short', day:'numeric', year:'numeric' })}</td>
      <td><span class="status-pill ${pillClass(a.status)}">${pillLabel(a.status)}</span></td>
      <td><a href="applicant-detail.html?id=${a.id}" class="btn-view">View</a></td>
    </tr>
  `).join('');
}

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: profile } = await sb.from('yz_profiles').select('role,full_name,email').eq('id', session.user.id).single();
  if (!profile || !['admin','hr'].includes(profile.role)) {
    window.location.href = '../applicant-dashboard.html'; return;
  }
  document.getElementById('sidebarUser').textContent = profile.full_name || profile.email;

  const { data: apps } = await sb
    .from('yz_applications')
    .select('id, full_name, email, position_applied, status, created_at')
    .order('created_at', { ascending: false });

  allApps = apps || [];

  // Populate position filter
  const positions = [...new Set(allApps.map(a => a.position_applied))].sort();
  const posFilter = document.getElementById('posFilter');
  positions.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    posFilter.appendChild(o);
  });

  renderTable(allApps);
})();

function exportCSV() {
  const headers = ['Name','Email','Phone','Position','Date Applied','Status'];
  const rows = allApps.map(a => [
    a.full_name||'', a.email||'', a.phone||'', a.position_applied||'',
    new Date(a.created_at).toLocaleDateString('en-PH'), a.status||''
  ].map(v => '"' + String(v).replace(/"/g,'""') + '"'));
  const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'yz-applications-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
}
</script>
</body>
</html>
